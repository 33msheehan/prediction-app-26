<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Forecast Workbench — ticket tracker</title>

    <style>
      :root {
        --bg: #ffffff;
        --bg-secondary: #f7f7f7;
        --text: #1a1a1a;
        --text-secondary: #666;
        --text-tertiary: #999;
        --border: rgba(0, 0, 0, 0.1);
        /* Blue/orange/gray palette — distinguishable under deuteranopia & protanopia (avoids red/green). */
        --done: #0a5dc2;
        --done-bg: #e3eefc;
        --progress: #c1620a;
        --progress-bg: #fbe9d9;
        --todo: #6b6b6b;
        --todo-bg: #ececec;
        --mono: 'SF Mono', Menlo, Consolas, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --bg-secondary: #242424;
          --text: #eaeaea;
          --text-secondary: #aaa;
          --text-tertiary: #777;
          --border: rgba(255, 255, 255, 0.12);
          --done: #5b9eef;
          --done-bg: #1c2c40;
          --progress: #e0954c;
          --progress-bg: #3a2a18;
          --todo: #9a9a9a;
          --todo-bg: #2c2c2c;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 2rem 1.5rem 4rem;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.5;
      }
      .wrap {
        max-width: 880px;
        margin: 0 auto;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .subtitle {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 1.5rem;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 1.5rem;
      }
      .stat {
        background: var(--bg-secondary);
        border-radius: 10px;
        padding: 12px 14px;
      }
      .stat .label {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .stat .value {
        font-size: 22px;
        font-weight: 600;
        margin-top: 2px;
      }
      .summary {
        background: var(--bg-secondary);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 1.5rem;
      }
      .summary .heading {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .summary p {
        font-size: 13px;
        color: var(--text-secondary);
        margin: 0 0 10px;
      }
      .summary ol {
        margin: 0;
        padding-left: 18px;
        font-size: 13px;
      }
      .summary li {
        margin-bottom: 4px;
      }
      .summary li b {
        font-family: var(--mono);
        font-weight: 600;
        color: var(--text);
      }
      .legend {
        display: flex;
        gap: 16px;
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 1.5rem;
        align-items: center;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 100%;
        height: 100%;
      }
      .controls {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
      }
      .controls input {
        flex: 1;
        font-size: 13px;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
      }
      .controls input:focus {
        outline: 2px solid var(--progress);
        outline-offset: -1px;
      }
      .phase {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 12px;
      }
      .phase-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
        cursor: pointer;
      }
      .phase-header .name {
        font-size: 14px;
        font-weight: 600;
      }
      .phase-header .count {
        font-size: 12px;
        color: var(--text-secondary);
      }
      .phase-review {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-secondary);
        margin: -2px 0 9px;
      }
      .phase-review strong {
        color: var(--text);
        font-weight: 600;
      }
      .phase-bar {
        height: 3px;
        background: var(--todo);
        border-radius: 2px;
        margin-bottom: 10px;
        overflow: hidden;
      }
      .phase-bar > div {
        height: 100%;
        background: var(--done);
      }
      .tickets {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 6px;
      }
      .ticket {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        padding: 6px 8px;
        border-radius: 6px;
        border-left: 3px solid var(--todo);
        background: var(--todo-bg);
      }
      .ticket.progress {
        border-left-color: var(--progress);
        background: var(--progress-bg);
      }
      .ticket.done {
        border-left-color: var(--done);
        background: var(--done-bg);
      }
      .ticket .id {
        font-family: var(--mono);
        color: var(--text-secondary);
        min-width: 36px;
        flex-shrink: 0;
      }
      .ticket .title {
        color: var(--text);
      }
      .ticket.done .title {
        color: var(--text-secondary);
        text-decoration: line-through;
      }
      .ticket .icon {
        color: var(--todo);
      }
      .ticket.progress .icon {
        color: var(--progress);
      }
      .ticket.done .icon {
        color: var(--done);
      }
      .ticket {
        width: 100%;
        border: none;
        cursor: pointer;
        font-family: inherit;
        text-align: left;
      }
      .ticket .chevron {
        margin-left: auto;
        font-size: 11px;
        color: var(--text-tertiary);
        transition: transform 0.15s;
        flex-shrink: 0;
      }
      .ticket[aria-expanded='true'] .chevron {
        transform: rotate(90deg);
      }
      .ticket-wrap {
        grid-column: 1 / -1;
      }
      .tickets.has-detail {
        grid-template-columns: 1fr;
      }
      .detail {
        padding: 10px 12px 4px 30px;
        margin: 2px 0 6px;
        border-left: 3px solid var(--border);
        font-size: 13px;
        color: var(--text-secondary);
      }
      .detail h4 {
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        margin: 10px 0 4px;
      }
      .detail h4:first-child {
        margin-top: 0;
      }
      .detail ul {
        margin: 0 0 2px;
        padding-left: 16px;
      }
      .detail li {
        margin-bottom: 2px;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 2px;
      }
      .chip {
        font-family: var(--mono);
        font-size: 11px;
        background: var(--bg-secondary);
        border-radius: 4px;
        padding: 2px 6px;
        color: var(--text-secondary);
      }
      .checklist {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 4px;
      }
      .check-item {
        display: flex;
        align-items: flex-start;
        gap: 6px;
      }
      .check-item .icon {
        width: 14px;
        height: 14px;
        margin-top: 1px;
      }
      .check-item.na {
        opacity: 0.55;
      }
      .check-reason {
        font-size: 12px;
        color: var(--text-tertiary);
        margin: -2px 0 0 20px;
      }
      .hidden {
        display: none !important;
      }
      footer {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-top: 2rem;
        text-align: center;
      }
    </style>
  </head>

      document.getElementById('updated').textContent = LAST_UPDATED;

      // Distinct shapes per status (not color alone) so it reads for colorblind users.
      const ICONS = {
        todo: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="8" cy="8" r="6"/></svg>',
        progress:
          '<svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M8 2 A6 6 0 0 0 8 14 Z" fill="currentColor"/></svg>',
        done: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="12" height="12" rx="2" stroke-width="1.6"/><path d="M5 8.5 L7 10.5 L11 6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        na: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8 H13" stroke-linecap="round"/></svg>',
      };
      const STATUS_LABEL = { todo: 'Not started', progress: 'In progress', done: 'Done' };
      const PHASE_REVIEW_LABEL = {
        not_ready: 'Not ready for review',
        pending: 'Awaiting independent review',
        in_review: 'Independent review in progress',
        changes_requested: 'Changes requested',
        passed: 'Independent review passed',
      };

      // status/complete are always derived from progress + human.needed — never stored,
      // so the row icon and the checklist inside it can't disagree with each other.
      function isComplete(t) {
        return (
          t.progress.started &&
          t.progress.testsWritten &&
          (!t.human.needed || t.progress.humanVerified)
        );
      }
      function statusOf(t) {
        if (isComplete(t)) return 'done';
        if (t.progress.started) return 'progress';
        return 'todo';
      }

      function isPhaseComplete(phase) {
        return phase.tickets.every(isComplete) && phase.phaseReview.status === 'passed';
      }

      document.getElementById('legend').innerHTML = Object.keys(STATUS_LABEL)
        .map(
          (s) =>
            `<span class="legend-item"><span class="icon" style="color:var(--${s})">${ICONS[s]}</span>${STATUS_LABEL[s]}</span>`,
        )
        .join('');

      document.getElementById('summary').innerHTML = `
  <div class="heading">Where we are</div>
  <p>${SUMMARY.where}</p>
  <div class="heading">Recommended next steps</div>
  <ol>
    ${SUMMARY.next.map((n) => `<li>${n}</li>`).join('')}
  </ol>
`;

      const allTickets = phases.flatMap((p) => p.tickets);
      const counts = { todo: 0, progress: 0, done: 0 };
      allTickets.forEach((t) => counts[statusOf(t)]++);

      document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="label">Total</div><div class="value">${allTickets.length}</div></div>
  <div class="stat"><div class="label">Done</div><div class="value">${counts.done}</div></div>
  <div class="stat"><div class="label">In progress</div><div class="value">${counts.progress}</div></div>
  <div class="stat"><div class="label">Not started</div><div class="value">${counts.todo}</div></div>
`;

      const board = document.getElementById('board');
      const expanded = new Set();
      let currentQuery = '';

      function checkRow(label, checked, na) {
        const key = na ? 'na' : checked ? 'done' : 'todo';
        return `<div class="check-item${na ? ' na' : ''}"><span class="icon" style="color:var(--${key})">${ICONS[key]}</span><span>${label}</span></div>`;
      }

      function detailHTML(t) {
        const human = t.human.needed
          ? checkRow('Verified by human', t.progress.humanVerified, false)
          : checkRow('Human verification — not required', false, true);
        return `
    <div class="detail">
      <h4>Goal</h4>
      <div>${t.goal}</div>
      <h4>Implementation</h4>
      <ul>${t.implementation.map((i) => `<li>${i}</li>`).join('')}</ul>
      <h4>Acceptance criteria</h4>
      <ul>${t.acceptance.map((a) => `<li>${a}</li>`).join('')}</ul>
      <h4>Tests</h4>
      <ul>${t.tests.map((x) => `<li>${x}</li>`).join('')}</ul>
      <h4>Depends on</h4>
      <div class="chips">${t.dependsOn.length ? t.dependsOn.map((d) => `<span class="chip">${d}</span>`).join('') : '<span class="chip">none</span>'}</div>
      <h4>Checklist</h4>
      <div class="checklist">
        ${checkRow('Started', t.progress.started, false)}
        ${checkRow('Tests written & green', t.progress.testsWritten, false)}
        ${human}
        ${t.human.needed ? `<div class="check-reason">${t.human.reason}</div>` : ''}
        ${checkRow('Complete', isComplete(t), false)}
      </div>
    </div>
  `;
      }

      function toggleExpand(id) {
        if (expanded.has(id)) expanded.delete(id);
        else expanded.add(id);
        render(currentQuery);
      }
      window.toggleExpand = toggleExpand;

      function render(filter) {
        currentQuery = filter || '';
        board.innerHTML = '';
        const q = currentQuery.trim().toLowerCase();

        phases.forEach((phase) => {
          const matched = phase.tickets.filter(
            (t) => !q || t.id.toLowerCase().includes(q) || t.title.toLowerCase().includes(q),
          );
          if (q && matched.length === 0) return;

          const done = phase.tickets.filter((t) => statusOf(t) === 'done').length;
          const pct = Math.round((done / phase.tickets.length) * 100);
          const review = phase.phaseReview;
          const reviewDetail =
            review.status === 'passed'
              ? `${PHASE_REVIEW_LABEL[review.status]} by ${review.reviewer} on ${review.reviewedAt}`
              : PHASE_REVIEW_LABEL[review.status];

          const section = document.createElement('div');
          section.className = 'phase';
          section.innerHTML = `
      <div class="phase-header">
        <span class="name">${phase.name}</span>
        <span class="count">${done}/${phase.tickets.length} tickets${isPhaseComplete(phase) ? ' · phase done' : ''}</span>
      </div>
      <div class="phase-bar"><div style="width:${pct}%"></div></div>
      <div class="phase-review"><strong>Phase gate:</strong> ${reviewDetail}</div>
      <div class="tickets has-detail">
        ${matched
          .map((t) => {
            const s = statusOf(t);
            const isOpen = expanded.has(t.id);
            return `
            <div class="ticket-wrap">
              <button class="ticket ${s}" aria-expanded="${isOpen}" onclick="toggleExpand('${t.id}')">
                <span class="icon">${ICONS[s]}</span>
                <span class="id">${t.id}</span>
                <span class="title">${t.title}</span>
                <span class="chevron">&#8250;</span>
              </button>
              ${isOpen ? detailHTML(t) : ''}
            </div>
          `;
          })
          .join('')}
      </div>
    `;
          board.appendChild(section);
        });
      }

      render('');
      document.getElementById('search').addEventListener('input', (e) => render(e.target.value));
    </script>
  </body>
