name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-and-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - name: Set ephemeral branch expiration
        run: echo "NEON_BRANCH_EXPIRES_AT=$(date -u --date '+1 day' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create ephemeral Neon branch
        id: create-neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.NEON_BRANCH_EXPIRES_AT }}

      - name: Apply migrations
        run: npm run db:migrate
        env:
          POSTGRES_URL: ${{ steps.create-neon-branch.outputs.db_url }}

      - name: Verify migrations are idempotent
        run: npm run db:migrate
        env:
          POSTGRES_URL: ${{ steps.create-neon-branch.outputs.db_url }}

      - name: Run tests against ephemeral database
        run: npm test
        env:
          POSTGRES_URL: ${{ steps.create-neon-branch.outputs.db_url_pooled }}

      - run: npm run build

      - name: Delete ephemeral Neon branch
        if: always() && steps.create-neon-branch.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.create-neon-branch.outputs.branch_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

  e2e:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

  # tracker.html and the README TRACKER block are generated from BUILD_PLAN.md +
  # PROGRESS.md. Agents edit only those two files; this job keeps the rendered
  # artifacts in sync on main so feature branches never touch (and never conflict
  # on) the generated output.
  sync-tracker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run tracker:generate

      - name: Commit regenerated tracker if changed
        run: |
          if git diff --quiet -- tracker.html README.md; then
            echo "tracker.html and README already in sync."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.html README.md
          git commit -m "chore: regenerate tracker from BUILD_PLAN/PROGRESS [skip ci]"
          git push
