name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-and-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - name: Set ephemeral branch expiration
        run: echo "NEON_BRANCH_EXPIRES_AT=$(date -u --date '+1 day' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create ephemeral Neon branch
        id: create-neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.NEON_BRANCH_EXPIRES_AT }}

      - name: Apply migrations
        run: npm run db:migrate
        env:
          POSTGRES_URL: ${{ steps.create-neon-branch.outputs.db_url }}

      - name: Verify migrations are idempotent
        run: npm run db:migrate
        env:
          POSTGRES_URL: ${{ steps.create-neon-branch.outputs.db_url }}

      - name: Run tests against ephemeral database
        run: npm test
        env:
          POSTGRES_URL: ${{ steps.create-neon-branch.outputs.db_url_pooled }}

      - run: npm run build

      - name: Delete ephemeral Neon branch
        if: always() && steps.create-neon-branch.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.create-neon-branch.outputs.branch_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

  e2e:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          # Auth.js throws on every request without a secret (and the dev
          # server backing these e2e tests has no real GitHub OAuth app to
          # talk to anyway) -- a fixed non-production value is all that's
          # needed for proxy.ts/getCurrentUser() to behave deterministically.
          AUTH_SECRET: e2e-test-secret-do-not-use-in-production

  # tracker.html and the README TRACKER block are generated from BUILD_PLAN.md +
  # PROGRESS.md. Agents edit only those two files; this job keeps the rendered
  # artifacts in sync by committing them onto the PR branch itself (so they're
  # already correct by the time the PR merges into main). It runs only on
  # pull_request: main is branch-protected against direct pushes — including
  # from the Actions bot, which isn't an admin and so can't bypass that rule
  # the way a human maintainer can — so pushing the regenerated files straight
  # to main after merge doesn't work. No [skip ci] on the commit: the pushed
  # commit becomes the PR's new head, and it still needs real build-and-test/
  # e2e runs of its own before merge is allowed.
  sync-tracker:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run tracker:generate

      - name: Commit regenerated tracker if changed
        run: |
          if git diff --quiet -- tracker.html README.md; then
            echo "tracker.html and README already in sync."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracker.html README.md
          git commit -m "chore: regenerate tracker from BUILD_PLAN/PROGRESS"
          git push origin HEAD:${{ github.head_ref }}
